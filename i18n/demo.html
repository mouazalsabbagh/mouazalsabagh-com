<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>i18n demo — EN/AR</title>
  <style>
    :root { --bg:#0e1116; --panel:#161b22; --accent:#9acd32; --text:#e6edf3; --muted:#8b949e; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: Arial, "Helvetica Neue", sans-serif; background:var(--bg); color:var(--text); }
    /* Arabic webfont fallback + RTL tweaks */
    html[dir="rtl"] body { font-family:"Segoe UI","Tahoma","Arial",sans-serif; }
    header { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.5rem; background:var(--panel); border-bottom:1px solid #222; }
    .brand { font-weight:800; font-size:1.3rem; color:var(--accent); letter-spacing:-.5px; }
    nav ul { list-style:none; display:flex; gap:1.2rem; margin:0; padding:0; }
    nav a { color:var(--text); text-decoration:none; font-size:.95rem; }
    nav a:hover { color:var(--accent); }
    .lang-btn { background:var(--accent); color:#0e1116; border:0; border-radius:6px; padding:.45rem .9rem; font-weight:700; cursor:pointer; font-family:inherit; }
    main { max-width:680px; margin:3rem auto; padding:0 1.5rem; }
    h1 { font-size:1.6rem; margin:.2rem 0 .4rem; }
    .role { color:var(--accent); font-weight:600; margin-bottom:2rem; }
    .card { background:var(--panel); border:1px solid #222; border-radius:10px; padding:1.4rem; margin-bottom:1.2rem; }
    label { display:block; font-size:.85rem; color:var(--muted); margin:.6rem 0 .25rem; }
    input, textarea { width:100%; padding:.6rem; background:#0e1116; border:1px solid #2a2f37; border-radius:6px; color:var(--text); font-family:inherit; }
    .submit { margin-top:1rem; background:var(--accent); color:#0e1116; border:0; border-radius:6px; padding:.6rem 1.2rem; font-weight:700; cursor:pointer; font-family:inherit; }
    .note { color:var(--muted); font-size:.8rem; margin-top:2rem; }
  </style>
</head>
<body>
  <header>
    <div class="brand">mouaz.</div>
    <nav>
      <ul>
        <li><a href="#" data-i18n="nav.home">Home</a></li>
        <li><a href="#" data-i18n="nav.about">About</a></li>
        <li><a href="#" data-i18n="nav.works">Works</a></li>
        <li><a href="#" data-i18n="nav.services">Services</a></li>
        <li><a href="#" data-i18n="nav.contact">Contact</a></li>
      </ul>
    </nav>
    <button class="lang-btn" data-i18n-toggle>العربية</button>
  </header>

  <main>
    <h1 data-i18n="section.work_education">Work &amp; Education</h1>
    <div class="role" data-i18n="hero.role">Senior Art Director &amp; Creative Technologist</div>

    <div class="card">
      <label data-i18n="form.name">Your Name</label>
      <input type="text" data-i18n-attr="placeholder:form.name">
      <label data-i18n="form.email">Email</label>
      <input type="email" data-i18n-attr="placeholder:form.email">
      <label data-i18n="form.message">Message</label>
      <textarea rows="3" data-i18n-attr="placeholder:form.message"></textarea>
      <button class="submit" data-i18n="form.submit">Send Message</button>
    </div>

    <button class="submit" data-i18n="btn.view_cv">View CV</button>

    <p class="note">
      Click <strong>العربية / English</strong> to switch. Language persists across reloads
      (localStorage) and can be forced with <code>?lang=ar</code>. Direction flips to RTL for Arabic.
    </p>
  </main>

  <script src="i18n.js" data-i18n-src="strings.json"></script>
</body>
</html>
